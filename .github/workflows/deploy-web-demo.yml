name: Deploy web demo

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: read-only for the whole workflow. Only the deploy
# job, which publishes to GitHub Pages, is granted the write scopes it needs.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: 3.41.9
          channel: stable

      - name: Build Gemini Live web demo
        working-directory: example_gemini_live
        run: |
          flutter pub get
          flutter build web --release --base-href /audio_io/

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: example_gemini_live/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # actions/deploy-pages needs pages:write to publish and id-token:write for
    # the OIDC token the Pages deployment uses. Scoped to this job only.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
